<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b10"/>
      <stop offset="0.45" stop-color="#0f0f18"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="25%" r="70%">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffb020" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="700" rx="36" fill="url(#glow)"/>

  <!-- crown + brush -->
  <g transform="translate(160,90)" opacity="0.98">
    <path d="M180 80l70 110 70-150 80 150 70-110 30 250H150z" fill="rgba(12,12,18,0.85)" stroke="url(#gold)" stroke-width="6"/>
    <path d="M190 330h660" stroke="rgba(212,175,55,0.35)" stroke-width="10" stroke-linecap="round"/>
    <g transform="translate(560,140)">
      <path d="M30 0l120 90c20 15 24 44 9 65l-40 56c-15 22-45 28-68 14L-10 198c-22-13-30-41-18-64l30-66c8-17 26-28 44-28z"
            fill="rgba(212,175,55,0.18)" stroke="rgba(212,175,55,0.55)" stroke-width="4"/>
      <path d="M20 210l-40 70" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"/>
      <circle cx="40" cy="235" r="7" fill="#d4af37" opacity="0.9"/>
    </g>
  </g>

  <text x="70" y="620" fill="#f7e7a8" font-family="ui-sans-serif, system-ui" font-size="44" font-weight="800" letter-spacing="2">
