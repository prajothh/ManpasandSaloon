<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b10"/>
      <stop offset="0.5" stop-color="#13131c"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="20%" r="70%">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffb020" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="700" rx="36" fill="url(#glow)"/>

  <!-- stylized hand -->
  <g opacity="0.98">
    <path d="M520 210c0-62 50-112 112-112s112 50 112 112v120c0 25-20 45-45 45h-134c-25 0-45-20-45-45V210z"
          fill="rgba(12,12,18,0.82)" stroke="rgba(212,175,55,0.35)" stroke-width="4"/>
    <path d="M450 330c30-30 80-30 110 0l40 40c20 20 20 52 0 72l-90 90c-40 40-105 40-145 0-40-40-40-105 0-145l85-85z"
          fill="rgba(10,10,15,0.7)" stroke="rgba(212,175,55,0.28)" stroke-width="4"/>
    <path d="M694 330c-30-30-80-30-110 0l-40 40c-20 20-20 52 0 72l90 90c40 40 105 40 145 0 40-40 40-105 0-145l-85-85z"
          fill="rgba(10,10,15,0.7)" stroke="rgba(212,175,55,0.28)" stroke-width="4"/>

    <!-- nails -->
    <g>
      <rect x="548" y="240" width="28" height="160" rx="14" fill="rgba(212,175,55,0.18)" stroke="url(#gold)" stroke-width="3"/>
      <rect x="610" y="235" width="28" height="170" rx="14" fill="rgba(212,175,55,0.16)" stroke="url(#gold)" stroke-width="3"/>
      <rect x="672" y="240" width="28" height="160" rx="14" fill="rgba(212,175,55,0.18)" stroke="url(#gold)" stroke-width="3"/>
    </g>
  </g>

  <g opacity="0.9">
    <circle cx="230" cy="210" r="9" fill="#d4af37" opacity="0.8"/>
    <circle cx="980" cy="210" r="7" fill="#ffb020" opacity="0.7"/>
    <circle cx="1015" cy="420" r="6" fill="#60a5fa" opacity="0.35"/>
  </g>

  <text x="70" y="620" fill="#f7e7a8" font-family="ui-sans-serif, system-ui" font-size="44" font-weight="800" letter-spacing="2">
    Mani &amp; Pedicure
  </text>
  <text x="70" y="660" fill="rgba(244,244,245,0.75)" font-family="ui-sans-serif, system-ui" font-size="24" font-weight="600" letter-spacing="1">
    Nail care " Polish " Clean finish
  </text>
</svg>

