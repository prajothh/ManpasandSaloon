<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b10"/>
      <stop offset="0.5" stop-color="#151521"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="20%" r="75%">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffb020" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="700" rx="36" fill="url(#glow)"/>

  <!-- paisley / henna pattern -->
  <g transform="translate(170,120)" opacity="0.98">
    <path d="M410 40c40 0 74 34 74 74 0 25-12 47-30 60 18 13 30 35 30 60 0 40-34 74-74 74s-74-34-74-74c0-25 12-47 30-60-18-13-30-35-30-60 0-40 34-74 74-74z"
          fill="rgba(212,175,55,0.10)" stroke="rgba(212,175,55,0.40)" stroke-width="4"/>
    <path d="M430 160c90-70 170-85 240-60 70 25 115 95 130 190"
          fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
    <path d="M220 260c50-120 130-195 225-220 95-25 200 12 315 110"
          fill="none" stroke="rgba(255,176,32,0.25)" stroke-width="10" stroke-linecap="round"/>
    <g opacity="0.85" fill="none" stroke-linecap="round">
      <path d="M110 320c40-30 80-45 120-45s80 15 120 45" stroke="rgba(212,175,55,0.35)" stroke-width="8"/>
      <path d="M585 320c40-30 80-45 120-45s80 15 120 45" stroke="rgba(212,175,55,0.25)" stroke-width="8"/>
    </g>
    <g>
      <circle cx="120" cy="420" r="10" fill="#d4af37" opacity="0.7"/>
      <circle cx="690" cy="420" r="8" fill="#ffb020" opacity="0.55"/>
      <circle cx="460" cy="410" r="6" fill="#60a5fa" opacity="0.45"/>
    </g>
  </g>

  <text x="70" y="620" fill="#f7e7a8" font-family="ui-sans-serif, system-ui" font-size="44" font-weight="800" letter-spacing="2">
    Wedding Mehndi
  </text>
  <text x="70" y="660" fill="rgba(244,244,245,0.75)" font-family="ui-sans-serif, system-ui" font-size="24" font-weight="600" letter-spacing="1">
    Intricate patterns " Bridal glow
  </text>
</svg>

