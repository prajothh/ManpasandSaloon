<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b10"/>
      <stop offset="0.45" stop-color="#16161f"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="20%" r="70%">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffb020" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="700" rx="36" fill="url(#glow)"/>

  <!-- abstract silhouette -->
  <g opacity="0.98">
    <path
      d="M585 190c58 0 105 47 105 105 0 40-22 74-53 93 4 25 16 51 45 68 32 19 62 55 62 106v64H416v-64c0-51 30-87 62-106 29-17 41-43 45-68-31-19-53-53-53-93 0-58 47-105 105-105z"
      fill="#0a0a0f"
      stroke="rgba(212,175,55,0.35)"
      stroke-width="3"
    />
    <path
      d="M445 280c20-85 92-140 190-140s170 55 190 140c-48-30-98-40-150-40-52 0-102 10-150 40z"
      fill="url(#hair)"
      opacity="0.95"
    />
    <path
      d="M410 320c30-55 82-90 165-90s135 35 165 90c-32-12-72-18-115-18s-83 6-115 18z"
      fill="url(#hair)"
      opacity="0.55"
    />
  </g>

  <!-- ornamental lines -->
  <g opacity="0.9">
    <path d="M130 520c140-120 290-140 430-60" fill="none" stroke="rgba(212,175,55,0.35)" stroke-width="8" stroke-linecap="round"/>
    <path d="M640 560c160-140 300-160 430-70" fill="none" stroke="rgba(255,176,32,0.25)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="250" cy="220" r="10" fill="#d4af37" opacity="0.8"/>
    <circle cx="980" cy="210" r="7" fill="#ffb020" opacity="0.7"/>
  </g>

  <text x="70" y="620" fill="#f7e7a8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="44" font-weight="800" letter-spacing="2">
    Men & Unisex Hair
  </text>
  <text x="70" y="660" fill="rgba(244,244,245,0.75)" font-family="ui-sans-serif, system-ui" font-size="24" font-weight="600" letter-spacing="1">
    Cuts " Fades " Styling
  </text>
</svg>

